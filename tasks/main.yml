---
- name: Ensures essential facts are gathered
  ansible.builtin.setup:
    gather_subset: all
  when: >-
    not (ansible_facts | default({})).get('os_family')
    or not (ansible_facts | default({})).get('distribution')
  tags: [always, metatrader_verify]
- name: Detect OS family from /etc/os-release
  ansible.builtin.shell: |
    set -o pipefail
    grep '^ID=' /etc/os-release | cut -d= -f2 | tr -d '"' | sed 's/./\u&/'
  args:
    executable: /bin/bash
  register: os_release_id
  changed_when: false
  failed_when: false
  when: not ansible_facts.get('os_family')
  tags: [always, metatrader_verify]
- name: Sets effective OS facts
  ansible.builtin.set_fact:
    effective_os_family: >-
      {%- set f_os = (ansible_facts.get('os_family')
      or (ansible_os_family | default('')) or '') | string | trim -%}
      {%- set f_dist = (ansible_facts.get('distribution')
      or (ansible_distribution | default('')) or '') | string | trim -%}
      {%- set f_rel = (os_release_id.stdout | default('')) | string | trim -%}
      {%- if f_os != '' and f_os != 'None' -%}
        {{ f_os }}
      {%- elif f_dist != '' and f_dist != 'None' -%}
        {{ f_dist }}
      {%- elif f_rel != '' -%}
        {{ f_rel }}
      {%- elif ansible_facts.get('pkg_mgr') == 'apt' -%}
        Debian
      {%- else -%}
        OtherLinux
      {%- endif -%}
  tags: [always, metatrader_verify]
- name: Ensure effective OS family is not empty
  ansible.builtin.set_fact:
    effective_os_family: OtherLinux
  when: >-
    effective_os_family is not defined
    or (effective_os_family | trim | length == 0)
    or effective_os_family == "None"
  tags: [always, metatrader_verify]
- name: Debug OS facts
  ansible.builtin.debug:
    msg: effective_os_family is '{{ effective_os_family }}'
  when: ansible_verbosity | default(0) >= 1
  tags: [always, metatrader_verify]
- name: Sets effective environment facts
  ansible.builtin.set_fact:
    effective_display: "{{ ansible_facts.get('env', {}).get('DISPLAY') | default(':0', true) }}"
    effective_home: >-
      {%- set u_dir = (ansible_facts.get('user_dir') or '') | string | trim -%}
      {%- set e_home = (ansible_facts.get('env', {}).get('HOME') or '') | string | trim -%}
      {%- if u_dir != '' -%}{{ u_dir -}}
      {%- elif e_home != '' -%}{{ e_home -}}
      {%- else -%}/root{%- endif -%}
    effective_xdg_runtime_dir: >-
      {{ (ansible_facts.get('env') or {}).get('XDG_RUNTIME_DIR')
      | default('/tmp/runtime-root', true) }}
  tags: [always, metatrader_verify]
- name: Ensures home directory exists
  ansible.builtin.file:
    path: '{{ effective_home }}'
    state: directory
    mode: '0755'
  when: effective_os_family != "Windows"
- name: Ensures the detected OS family is supported by this role
  ansible.builtin.assert:
    that:
      - effective_os_family | trim | length > 0
      - effective_os_family | trim in metatrader_become_method
    fail_msg: >-
      Unsupported OS family: {{ effective_os_family | default('empty', true) }}.
      Supported: {{ metatrader_become_method.keys() | sort | join(', ') }}.
- name: Sets metatrader_local_facts fact
  ansible.builtin.set_fact:
    metatrader_local_facts: "{{ ansible_facts.get('ansible_local', {}).get('metatrader', {}) }}"
- name: Checks if platform is already exist
  ansible.builtin.stat:
    path: >-
      {{ metatrader_local_facts.get(metatrader_version | string, {}).get('path')
      | default(effective_home + '/.wine/drive_c/Program Files/MetaTrader ' + (metatrader_version | string), true) }}
  register: stat_mt
  when:
    - metatrader_local_facts is defined
    - metatrader_local_facts.get(metatrader_version | string) is defined
    - metatrader_local_facts.get(metatrader_version | string, {}).get('path') is defined
- name: Ensures platform is installed
  when:
    - effective_os_family != "Windows" # gather_facts is required.
    - >-
      (metatrader_local_facts is not defined) or
      (metatrader_local_facts.get(metatrader_version | string) is not defined) or
      (not stat_mt.stat.exists | default(false))
  block:
    - name: Validates variables
      ansible.builtin.assert:
        that:
          - metatrader_setup_url | length > 0
    - name: Checks if platform is already installed
      register: file_mt_installed_exists
      ansible.builtin.stat:
        path: '{{ effective_home }}/.wine/.installed-mt{{ metatrader_version }}'
      when:
        - effective_os_family != "Windows"
    - name: Ensures Curl is present (standard distros)
      ansible.builtin.package:
        name: curl
        state: present
      no_log: '{{ ansible_verbosity | default(0) < 1 }}'
      when:
        - effective_os_family not in ["Windows"]
        - ansible_facts.get('pkg_mgr') not in ["unknown", "", None]
        - not file_mt_installed_exists.stat.exists
    - name: Ensures X11 utilities are present (standard distros)
      ansible.builtin.package:
        name: x11-utils
        state: present
      no_log: '{{ ansible_verbosity | default(0) < 1 }}'
      when:
        - effective_os_family not in ["Windows"]
        - ansible_facts.get('pkg_mgr') not in ["unknown", "", None]
        - not file_mt_installed_exists.stat.exists
    - name: Ensures verb installation file is present
      ansible.builtin.template:
        src: mt{{ metatrader_version }}_install.verb.j2
        dest: /tmp/mt{{ metatrader_version }}_install.verb
        mode: '0640'
      when:
        - not file_mt_installed_exists.stat.exists
- name: Checks if Xvfb process is running
  ansible.builtin.command: pgrep -x Xvfb
  register: xvfb_pgrep
  changed_when: false
  failed_when: false
  when: effective_os_family != "Windows"
- name: Debug Xvfb status
  ansible.builtin.debug:
    msg: "Xvfb pgrep rc: {{ xvfb_pgrep.rc | default('N/A') }}"
  when:
    - effective_os_family != "Windows"
    - ansible_verbosity | default(0) >= 1
- name: Verifies X display is available for Wine
  ansible.builtin.shell: xdpyinfo >/dev/null 2>&1
  register: xdpyinfo_check
  failed_when: false
  changed_when: false
  until: xdpyinfo_check.rc == 0
  retries: 20
  delay: 5
  environment:
    DISPLAY: '{{ effective_display }}'
    HOME: '{{ effective_home }}'
    XDG_RUNTIME_DIR: '{{ effective_xdg_runtime_dir }}'
  when:
    - effective_os_family != "Windows"
    - not file_mt_installed_exists.stat.exists | default(false)
- name: Asserts X display is available
  ansible.builtin.assert:
    # Fail if xdpyinfo is missing (rc=127) or if it fails to connect to X (rc!=0).
    that: xdpyinfo_check.rc | default(0) == 0
    fail_msg: >-
      X display check failed (rc={{ xdpyinfo_check.rc | default('undefined') }}).
      {% if xdpyinfo_check.rc | default(0) == 127 %}
      The 'xdpyinfo' command is missing. Ensure 'x11-utils' or equivalent is installed.
      {% else %}
      X display is not available (DISPLAY={{ effective_display }}).
      Ensure Xvfb or another X server is running.
      {% endif %}
  when:
    - effective_os_family != "Windows"
    - not file_mt_installed_exists.stat.exists | default(false)
- name: Ensures MetaTrader is installed (via verb file)
  ansible.builtin.shell:
    # @todo: The winetricks command is executed directly without specifying the executable.
    # noqa command-instead-of-shell
    cmd: >
      winetricks -q /tmp/mt{{ metatrader_version }}_install.verb
      && touch {{ effective_home }}/.wine/.installed-mt{{ metatrader_version }}
    creates: '{{ effective_home }}/.wine/.installed-mt{{ metatrader_version }}'
  async: 1200
  poll: 10
  environment:
    DISPLAY: '{{ effective_display }}'
    HOME: '{{ effective_home }}'
    WINEDEBUG: -all
    WINEDLLOVERRIDES: mscoree=,mshtml=,winebrowser.exe=,dbghelp=b
    WINETRICKS_DOWNLOADER: curl
    XDG_RUNTIME_DIR: '{{ effective_xdg_runtime_dir }}'
    FONTCONFIG_FILE: /etc/fonts/fonts.conf
  when:
    - effective_os_family != "Windows"
    - not file_mt_installed_exists.stat.exists | default(false)
- name: Refreshes local facts
  ansible.builtin.setup:
    filter:
      - ansible_local
  when: effective_os_family != "Windows"
- name: Verifies
  ansible.builtin.include_tasks: verify.yml
  tags:
    - metatrader_verify
- name: Saves platform facts
  become: >-
    {{ (ansible_facts.get('user_id', 'root') | default('root', true) != 'root')
    or (effective_os_family == 'Windows') }}
  become_method: "{{ metatrader_become_method.get(effective_os_family, 'ansible.builtin.su') }}"
  when:
    - >-
      metatrader_local_facts is not defined
      or metatrader_local_facts[metatrader_version | string] is not defined
      or (find_mt_path_folder | default(''))
      != metatrader_local_facts[metatrader_version | string].path | default('')
  block:
    - name: Sets fact
      ansible.builtin.set_fact:
        cacheable: true
        metatrader: >-
          {{ {(metatrader_version | int | string): {'path': find_mt_path_folder}} }}
      when:
        - find_mt_path_folder is defined
        - find_mt_path_folder | length > 0
        - metatrader_version is defined
    - name: Ensures that Ansible local facts directory exists (Unix)
      ansible.builtin.file:
        path: /etc/ansible/facts.d
        state: directory
        mode: '0755'
      when: effective_os_family != "Windows"
    - name: Ensures that Ansible local facts directory exists (Windows)
      ansible.windows.win_file:
        # yamllint disable-line rule:line-length
        path: \\wsl.localhost\{{ wsl_distribution_name }}\home\{{ wsl_user_name }}\ansible\facts
        state: directory
      become: true
      become_method: "{{ metatrader_become_method.get(effective_os_family, 'ansible.builtin.su') }}"
      become_user: "{{ ansible_facts.get('env', {}).get('USERNAME') | default('Administrator', true) }}"
      when: effective_os_family == "Windows"
    - name: Saves role's facts (Unix)
      ansible.builtin.copy:
        content: '{{ metatrader | to_nice_json }}'
        dest: /etc/ansible/facts.d/metatrader.fact
        mode: '0644'
      when:
        - effective_os_family != "Windows"
        - metatrader is defined
    - name: Saves role's facts (Windows)
      ansible.windows.win_copy:
        content: '{{ metatrader | to_nice_json }}'
        # yamllint disable-line rule:line-length
        dest: \\wsl.localhost\{{ wsl_distribution_name }}\home\{{ wsl_user_name }}\ansible\facts\metatrader.fact
      become: true
      become_method: "{{ metatrader_become_method.get(effective_os_family, 'ansible.builtin.su') }}"
      become_user: "{{ ansible_facts.get('env', {}).get('USERNAME') | default('Administrator', true) }}"
      when:
        - effective_os_family == "Windows"
        - metatrader is defined
