---
- name: Detects NixOS
  ansible.builtin.command: nix-env --version
  register: nix_check
  changed_when: false
  failed_when: false
  check_mode: false
  when: ansible_facts.os_family == 'OtherLinux' or ansible_facts.distribution == 'NixOS'

- name: Sets detected_os_family fact
  ansible.builtin.set_fact:
    detected_os_family: >-
      {{ 'NixOS' if (ansible_facts.distribution == 'NixOS'
      or ansible_facts.os_family == 'NixOS'
      or (ansible_facts.os_family == 'OtherLinux'
      and nix_check.rc | default(1) == 0))
      else ansible_facts.os_family }}

- name: Sets ansible_os_family to NixOS if detected
  ansible.builtin.set_fact:
    ansible_os_family: NixOS
  when: detected_os_family == 'NixOS'

- name: Collects local facts
  ansible.builtin.setup:
    filter:
      - ansible_local
  when: false

- name: Populate paths
  ansible.builtin.include_tasks: paths.yml
  tags:
    - metatrader_paths

- name: Checks if platform already exists
  ansible.builtin.stat:
    path: "{{ mt_runner_mt_path_host }}"
  register: stat_mt_unix
  when: platform_name != "Windows"

- name: Checks if platform already exists (Windows)
  ansible.windows.win_stat:
    path: "{{ mt_runner_mt_path_host }}"
  register: stat_mt_windows
  when: platform_name == "Windows"

- name: Set stat_mt fact
  ansible.builtin.set_fact:
    stat_mt: "{{ stat_mt_windows if platform_name == 'Windows' else stat_mt_unix }}"

- name: Ensures platform is installed
  when:
    - >-
      (ansible_local['metatrader'] is not defined) or
      (ansible_local['metatrader'][metatrader_version | string] is not defined) or
      (not stat_mt.stat.exists)
  block:
    - name: Validates variables
      ansible.builtin.assert:
        that:
          - metatrader_setup_url | length > 0

    - name: Checks if platform is already installed (Unix)
      ansible.builtin.stat:
        path: ~/.wine/.installed-mt{{ metatrader_version }}
      register: file_mt_installed_exists_unix
      when: is_unix

    - name: Checks if platform is already installed (Windows)
      ansible.windows.win_stat:
        path: C:\Temp\.installed-mt{{ metatrader_version }}
      register: file_mt_installed_exists_windows
      when: platform_name == "Windows"

    - name: Checks if platform is already installed (Cygwin)
      ansible.windows.win_stat:
        path: /tmp/.installed-mt{{ metatrader_version }}
      register: file_mt_installed_exists_cygwin
      when: platform_name == "Cygwin"

    - name: Set file_mt_installed_exists fact
      ansible.builtin.set_fact:
        file_mt_installed_exists: >-
          {{ file_mt_installed_exists_windows if platform_name == 'Windows'
          else file_mt_installed_exists_cygwin if platform_name == 'Cygwin'
          else file_mt_installed_exists_unix }}

    - name: Ensures Curl is present (standard distros)
      ansible.builtin.package:
        name: curl
        state: present
      when:
        - is_unix
        - detected_os_family != "NixOS"
        - ansible_facts.pkg_mgr not in ["unknown", ""]
        - not file_mt_installed_exists.stat.exists

    - name: Ensures Curl is present (NixOS)
      ansible.builtin.command:
        cmd: nix-env -iA nixpkgs.curl
      register: nix_curl_install
      changed_when: "'installing' in nix_curl_install.stderr or 'copying path' in nix_curl_install.stderr"
      when:
        - detected_os_family == "NixOS"
        - not file_mt_installed_exists.stat.exists

    - name: Ensures X11 utilities are present (standard distros)
      ansible.builtin.package:
        name: x11-utils
        state: present
      when:
        - is_unix
        - detected_os_family != "NixOS"
        - ansible_facts.pkg_mgr not in ["unknown", ""]
        - not file_mt_installed_exists.stat.exists

    - name: Ensures X11 utilities are present (NixOS)
      ansible.builtin.command:
        cmd: nix-env -iA nixpkgs.xorg.xdpyinfo
      register: nix_xdpyinfo_install
      changed_when: "'installing' in nix_xdpyinfo_install.stderr or 'copying path' in nix_xdpyinfo_install.stderr"
      when:
        - detected_os_family == "NixOS"
        - not file_mt_installed_exists.stat.exists

    - name: Ensures verb installation file is present (Unix)
      ansible.builtin.template:
        src: mt{{ metatrader_version }}_install.verb.j2
        dest: /tmp/mt{{ metatrader_version }}_install.verb
        mode: '0640'
      when:
        - is_unix
        - not file_mt_installed_exists.stat.exists

    - name: Ensure Temp directory exists (Windows)
      ansible.windows.win_file:
        path: C:\Temp
        state: directory
      when:
        - platform_name == "Windows"
        - not file_mt_installed_exists.stat.exists

    - name: Ensures verb installation file is present (Cygwin)
      ansible.builtin.template:
        src: mt{{ metatrader_version }}_install.ahk.j2
        dest: /tmp/mt{{ metatrader_version }}_install.ahk
        mode: '0640'
      when:
        - platform_name == "Cygwin"
        - not file_mt_installed_exists.stat.exists

    - name: Ensures verb installation file is present (Windows)
      ansible.builtin.template:
        src: mt{{ metatrader_version }}_install.ahk.j2
        dest: C:\Temp\mt{{ metatrader_version }}_install.ahk
        mode: '0640'
      when:
        - platform_name == "Windows"
        - not file_mt_installed_exists.stat.exists

    - name: Verifies X display is available for Wine
      ansible.builtin.shell: xdpyinfo >/dev/null 2>&1
      register: xdpyinfo_check
      failed_when: false
      changed_when: false
      until: xdpyinfo_check.rc == 0
      retries: 10
      delay: 3
      environment:
        DISPLAY: "{{ ansible_env.DISPLAY | default(':0') }}"
        XDG_RUNTIME_DIR: "{{ ansible_env.XDG_RUNTIME_DIR | default('/tmp/runtime-root') }}"
      when:
        - is_unix
        - not file_mt_installed_exists.stat.exists

    - name: Asserts X display is available
      ansible.builtin.assert:
        # Fail if xdpyinfo is missing (rc=127) or if it fails to connect to X (rc!=0).
        that: xdpyinfo_check.rc | default(0) == 0
        fail_msg: >-
          X display check failed (rc={{ xdpyinfo_check.rc | default('undefined') }}).
          {% if xdpyinfo_check.rc | default(0) == 127 %}
          The 'xdpyinfo' command is missing. Ensure 'x11-utils' or equivalent is installed.
          {% else %}
          X display is not available (DISPLAY={{ ansible_env.DISPLAY | default(':0') }}).
          Ensure Xvfb or another X server is running.
          {% endif %}
      when:
        - is_unix
        - not file_mt_installed_exists.stat.exists

    - name: Ensures MetaTrader is installed (via verb file, Unix)
      ansible.builtin.shell:
        # noqa command-instead-of-shell
        cmd: >
          winetricks -q /tmp/mt{{ metatrader_version }}_install.verb
          && touch ~/.wine/.installed-mt{{ metatrader_version }}
        creates: ~/.wine/.installed-mt{{ metatrader_version }}
        executable: /bin/bash
      async: 1200
      poll: 10
      environment:
        DISPLAY: "{{ ansible_env.DISPLAY | default(':0') }}"
        WINEDEBUG: -all
        WINEDLLOVERRIDES: mscoree=,mshtml=,winebrowser.exe=,dbghelp=b
        WINETRICKS_DOWNLOADER: curl
        XDG_RUNTIME_DIR: "{{ ansible_env.XDG_RUNTIME_DIR | default('/tmp/runtime-root') }}"
        FONTCONFIG_FILE: >-
          {{ '/etc/fonts/fonts.conf' if (detected_os_family | default(ansible_os_family)) != 'NixOS'
             else (ansible_env.FONTCONFIG_FILE | default('/run/current-system/sw/etc/fonts/fonts.conf')) }}
      when:
        - is_unix
        - not file_mt_installed_exists.stat.exists
      changed_when: true

    # Installation via AutoHotkey.
    - name: Download AutoHotkey installer (Cygwin)
      ansible.builtin.get_url:
        url: https://www.autohotkey.com/download/1.1/AutoHotkey_1.1.37.02.zip
        dest: "{{ ansible_env.HOME }}/ahk-portable.zip"
        mode: "0644"
      when:
        - platform_name == "Cygwin"
        - not file_mt_installed_exists.stat.exists

    - name: Ensure ahk-portable directory exists (Cygwin)
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/ahk-portable"
        state: directory
        mode: "0755"
      when:
        - platform_name == "Cygwin"
        - not file_mt_installed_exists.stat.exists

    - name: Ensure ahk-portable/mt directory exists (Windows, Cygwin)
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/ahk-portable/mt"
        state: directory
        mode: "0755"
      when:
        - (platform_name == "Cygwin") or (platform_name == "Windows")
        - not file_mt_installed_exists.stat.exists

    - name: Downloading MetaTrader installer (Windows, Cygwin)
      ansible.builtin.get_url:
        url: "{{ metatrader_setup_url }}"
        dest: "{{ ansible_env.HOME }}/ahk-portable/mt/setup.exe"
        mode: "0755"
      when:
        - (platform_name == "Cygwin") or (platform_name == "Windows")
        - not file_mt_installed_exists.stat.exists

    - name: Chmod MetaTrader installer to make it executable (Cygwin, Windows)
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/ahk-portable/mt/setup.exe"
        mode: "0755"
      when:
        - (platform_name == "Cygwin") or (platform_name == "Windows")
        - not file_mt_installed_exists.stat.exists

    - name: Extract AutoHotkey (Cygwin)
      ansible.builtin.unarchive:
        src: "{{ ansible_env.HOME }}/ahk-portable.zip"
        dest: "{{ ansible_env.HOME }}/ahk-portable"
        remote_src: true
      when:
        - platform_name == "Cygwin"
        - not file_mt_installed_exists.stat.exists

    - name: Download AutoHotkey installer (Windows)
      ansible.windows.win_get_url:
        url: https://www.autohotkey.com/download/1.1/AutoHotkey_1.1.37.02.zip
        dest: "{{ ansible_env.HOME }}\\ahk-portable.zip"
      when:
        - platform_name == "Windows"
        - not file_mt_installed_exists.stat.exists

    - name: Ensure ahk-portable directory exists (Windows)
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}\\ahk-portable"
        state: directory
        mode: "0755"
      when:
        - platform_name == "Windows"
        - not file_mt_installed_exists.stat.exists

    - name: Extract AutoHotkey (Windows)
      community.windows.win_unzip:
        src: "{{ ansible_env.HOME }}\\ahk-portable.zip"
        dest: "{{ ansible_env.HOME }}\\ahk-portable"
      when:
        - platform_name == "Windows"
        - not file_mt_installed_exists.stat.exists

    - name: Verify AutoHotkey is extracted (Cygwin)
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/ahk-portable/AutoHotkeyU64.exe"
      register: ahk_stat_result_cygwin
      when:
        - platform_name == "Cygwin"
        - not file_mt_installed_exists.stat.exists

    - name: Verify AutoHotkey is installed (Windows)
      ansible.windows.win_stat:
        path: "{{ ansible_env.HOME }}\\ahk-portable\\AutoHotkeyU64.exe"
      register: ahk_stat_result_windows
      when:
        - platform_name == "Windows"
        - not file_mt_installed_exists.stat.exists

    - name: Set ahk_stat fact
      ansible.builtin.set_fact:
        ahk_stat: "{{ ahk_stat_result_windows if platform_name == 'Windows' else ahk_stat_result_cygwin }}"
      when:
        - (platform_name == "Cygwin") or (platform_name == "Windows")
        - not file_mt_installed_exists.stat.exists

    - name: Fail if AutoHotkey is not installed (Cygwin, Windows)
      ansible.builtin.fail:
        msg: AutoHotkey download/extraction failed!
      when:
        - not file_mt_installed_exists.stat.exists
        - (platform_name == "Cygwin" or platform_name == "Windows")
        - (ahk_stat.stat is not defined) or (not ahk_stat.stat.exists)

    - name: Chmod AutoHotkey to make it executable (Cygwin, Windows)
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/ahk-portable/AutoHotkeyU64.exe"
        mode: "0755"
      when:
        - (platform_name == "Cygwin") or (platform_name == "Windows")
        - not file_mt_installed_exists.stat.exists

    - name: Run installation with AutoHotkey (Cygwin)
      ansible.builtin.shell:
        cmd: "{{ ahk_stat.stat.path }} \"$(cygpath -w /tmp/mt{{ metatrader_version }}_install.ahk)\""
      args:
        executable: /bin/bash
        chdir: "{{ ansible_env.HOME }}/ahk-portable/mt"
      become: true
      become_method: ansible.builtin.runas
      become_user: SYSTEM
      when:
        - platform_name == "Cygwin"
        - not file_mt_installed_exists.stat.exists
      changed_when: true

    - name: Run installation with AutoHotkey (Windows)
      ansible.windows.win_shell:
        cmd: "{{ ahk_stat.stat.path }} C:\\Temp\\mt{{ metatrader_version }}_install.ahk"
      args:
        executable: cmd
        chdir: "{{ ansible_env.HOME }}/ahk-portable/mt"
      become: true
      become_method: ansible.builtin.runas
      become_user: SYSTEM
      when:
        - platform_name == "Windows"
        - not file_mt_installed_exists.stat.exists
      changed_when: true

    - name: Ensures verb installation file is absent (Unix)
      ansible.builtin.file:
        path: /tmp/mt{{ metatrader_version }}_install.verb
        state: absent
      when:
        - is_unix

- name: Verifies
  ansible.builtin.include_tasks: verify.yml
  tags:
    - metatrader_verify

- name: Saves platform facts
  become: >-
    {{ (ansible_facts.user_id is defined and ansible_facts.user_id != 'root')
    or (detected_os_family == 'Windows') }}
  become_method: "{{ metatrader_become_method[detected_os_family] }}"
  when:
    - >-
      ansible_local['metatrader'] is not defined
      or ansible_local['metatrader'][metatrader_version | string] is not defined
      or (find_mt_path_folder)
      != ansible_local['metatrader'][metatrader_version | string].path
  block:
    - name: Sets fact
      ansible.builtin.set_fact:
        cacheable: true
        metatrader: >-
          {{ {(metatrader_version | int | string): {'path': find_mt_path_folder}} }}
      when:
        - find_mt_path_folder is defined
        - find_mt_path_folder | length > 0
        - metatrader_version is defined

    - name: Ensures that Ansible local facts directory exists (Unix)
      ansible.builtin.file:
        path: /etc/ansible/facts.d
        state: directory
        mode: "0755"
      when: is_unix

    - name: Ensures that Ansible local facts directory exists (Cygwin)
      ansible.builtin.file:
        path: /etc/ansible/facts.d
        state: directory
        mode: "0755"
      become: false
      when: platform_name == "Cygwin"

    - name: Ensures that Ansible local facts directory exists (Windows)
      ansible.windows.win_file:
        # yamllint disable-line rule:line-length
        path: \\wsl.localhost\{{ wsl_distribution_name }}\home\{{ wsl_user_name }}\ansible\facts
        state: directory
      become: true
      become_method: ansible.builtin.runas
      become_user: "{{ ansible_env.USERNAME }}"
      when: platform_name == "Windows"

    - name: Saves role's facts (Unix)
      ansible.builtin.copy:
        content: "{{ metatrader | to_nice_json }}"
        dest: /etc/ansible/facts.d/metatrader.fact
        mode: "0644"
      when:
        - is_unix
        - metatrader is defined

    - name: Saves role's facts (Cygwin)
      ansible.builtin.copy:
        content: "{{ metatrader | to_nice_json }}"
        dest: /etc/ansible/facts.d/metatrader.fact
        mode: "0644"
      become: false
      when:
        - platform_name == "Cygwin"
        - metatrader is defined

    - name: Saves role's facts (Windows)
      ansible.windows.win_copy:
        content: "{{ metatrader | to_nice_json }}"
        # yamllint disable-line rule:line-length
        dest: \\wsl.localhost\{{ wsl_distribution_name }}\home\{{ wsl_user_name }}\ansible\facts\metatrader.fact
      become: true
      become_method: ansible.builtin.runas
      become_user: "{{ ansible_env.USERNAME }}"
      when:
        - platform_name == "Windows"
        - metatrader is defined
