---
- name: Detects NixOS
  ansible.builtin.command: nix-env --version
  register: nix_check
  changed_when: false
  failed_when: false
  check_mode: false
  when: ansible_facts.os_family == 'OtherLinux' or ansible_facts.distribution == 'NixOS'
- name: Sets detected_os_family fact
  ansible.builtin.set_fact:
    detected_os_family: >-
      {{ 'NixOS' if (ansible_facts.distribution == 'NixOS'
      or ansible_facts.os_family == 'NixOS'
      or (ansible_facts.os_family == 'OtherLinux'
      and nix_check.rc | default(1) == 0))
      else ansible_facts.os_family }}
- name: Sets ansible_os_family to NixOS if detected
  ansible.builtin.set_fact:
    ansible_os_family: NixOS
  when: detected_os_family == 'NixOS'
- name: Collects local facts
  ansible.builtin.setup:
    filter:
      - ansible_local
  when: false
- name: Checks if platform is already exist
  ansible.builtin.stat:
    path: "{{ ansible_local['metatrader'][metatrader_version | string].path | default('') }}"
  register: stat_mt
  when:
    - ansible_local['metatrader'] is defined
    - ansible_local['metatrader'][metatrader_version | string] is defined
    - ansible_local['metatrader'][metatrader_version | string].path is defined
- name: Ensures platform is installed
  when:
    - detected_os_family != "Windows" # gather_facts is required.
    - >-
      (ansible_local['metatrader'] is not defined) or
      (ansible_local['metatrader'][metatrader_version | string] is not defined) or
      (not stat_mt.stat.exists)
  block:
    - name: Validates variables
      ansible.builtin.assert:
        that:
          - metatrader_setup_url | length > 0
    - name: Checks if platform is already installed
      register: file_mt_installed_exists
      ansible.builtin.stat:
        path: ~/.wine/.installed-mt{{ metatrader_version }}
      when:
        - detected_os_family != "Windows"
    - name: Ensures Curl is present (standard distros)
      ansible.builtin.package:
        name: curl
        state: present
      when:
        - detected_os_family not in ["Windows", "NixOS"]
        - ansible_facts.pkg_mgr not in ["unknown", ""]
        - not file_mt_installed_exists.stat.exists
    - name: Ensures Curl is present (NixOS)
      ansible.builtin.command:
        cmd: nix-env -iA nixpkgs.curl
      register: nix_curl_install
      changed_when: "'installing' in nix_curl_install.stderr or 'copying path' in nix_curl_install.stderr"
      when:
        - detected_os_family == "NixOS"
        - not file_mt_installed_exists.stat.exists
    - name: Ensures X11 utilities are present (standard distros)
      ansible.builtin.package:
        name: x11-utils
        state: present
      when:
        - (detected_os_family | default(ansible_os_family)) not in ["Windows", "NixOS"]
        - ansible_facts.pkg_mgr not in ["unknown", ""]
        - not file_mt_installed_exists.stat.exists
    - name: Ensures X11 utilities are present (NixOS)
      ansible.builtin.command:
        cmd: nix-env -iA nixpkgs.xorg.xdpyinfo
      register: nix_xdpyinfo_install
      changed_when: "'installing' in nix_xdpyinfo_install.stderr or 'copying path' in nix_xdpyinfo_install.stderr"
      when:
        - detected_os_family == "NixOS"
        - not file_mt_installed_exists.stat.exists
    - name: Ensures verb installation file is present
      ansible.builtin.template:
        src: mt{{ metatrader_version }}_install.verb.j2
        dest: /tmp/mt{{ metatrader_version }}_install.verb
        mode: '0640'
      when:
        - not file_mt_installed_exists.stat.exists
    - name: Verifies X display is available for Wine
      ansible.builtin.shell: xdpyinfo >/dev/null 2>&1
      register: xdpyinfo_check
      failed_when: false
      changed_when: false
      until: xdpyinfo_check.rc == 0
      retries: 10
      delay: 3
      environment:
        DISPLAY: "{{ ansible_env.DISPLAY | default(':0') }}"
        XDG_RUNTIME_DIR: "{{ ansible_env.XDG_RUNTIME_DIR | default('/tmp/runtime-root') }}"
      when:
        - not file_mt_installed_exists.stat.exists
    - name: Asserts X display is available
      ansible.builtin.assert:
        # Fail if xdpyinfo is missing (rc=127) or if it fails to connect to X (rc!=0).
        that: xdpyinfo_check.rc | default(0) == 0
        fail_msg: >-
          X display check failed (rc={{ xdpyinfo_check.rc | default('undefined') }}).
          {% if xdpyinfo_check.rc | default(0) == 127 %}
          The 'xdpyinfo' command is missing. Ensure 'x11-utils' or equivalent is installed.
          {% else %}
          X display is not available (DISPLAY={{ ansible_env.DISPLAY | default(':0') }}).
          Ensure Xvfb or another X server is running.
          {% endif %}
      when:
        - not file_mt_installed_exists.stat.exists
    - name: Ensures MetaTrader is installed (via verb file)
      ansible.builtin.shell:
        # @todo: The winetricks command is executed directly without specifying the executable.
        # noqa command-instead-of-shell
        cmd: >
          winetricks -q /tmp/mt{{ metatrader_version }}_install.verb
          && touch ~/.wine/.installed-mt{{ metatrader_version }}
        creates: ~/.wine/.installed-mt{{ metatrader_version }}
      async: 1200
      poll: 10
      environment:
        DISPLAY: "{{ ansible_env.DISPLAY | default(':0') }}"
        WINEDEBUG: -all
        WINEDLLOVERRIDES: mscoree=,mshtml=,winebrowser.exe=,dbghelp=b
        WINETRICKS_DOWNLOADER: curl
        XDG_RUNTIME_DIR: "{{ ansible_env.XDG_RUNTIME_DIR | default('/tmp/runtime-root') }}"
        FONTCONFIG_FILE: >-
          {{ '/etc/fonts/fonts.conf' if (detected_os_family | default(ansible_os_family)) != 'NixOS'
             else (ansible_env.FONTCONFIG_FILE | default('/run/current-system/sw/etc/fonts/fonts.conf')) }}
      when:
        - not file_mt_installed_exists.stat.exists
- name: Verifies
  ansible.builtin.include_tasks: verify.yml
  tags:
    - metatrader_verify
- name: Saves platform facts
  become: >-
    {{ (ansible_facts.user_id is defined and ansible_facts.user_id != 'root')
    or (detected_os_family == 'Windows') }}
  become_method: '{{ metatrader_become_method[detected_os_family] }}'
  when:
    - >-
      ansible_local['metatrader'] is not defined
      or ansible_local['metatrader'][metatrader_version | string] is not defined
      or (find_mt_path_folder)
      != ansible_local['metatrader'][metatrader_version | string].path
  block:
    - name: Sets fact
      ansible.builtin.set_fact:
        cacheable: true
        metatrader: >-
          {{ {(metatrader_version | int | string): {'path': find_mt_path_folder}} }}
      when:
        - find_mt_path_folder is defined
        - find_mt_path_folder | length > 0
        - metatrader_version is defined
    - name: Ensures that Ansible local facts directory exists (Unix)
      ansible.builtin.file:
        path: /etc/ansible/facts.d
        state: directory
        mode: '0755'
      when: detected_os_family != "Windows"
    - name: Ensures that Ansible local facts directory exists (Windows)
      ansible.windows.win_file:
        # yamllint disable-line rule:line-length
        path: \\wsl.localhost\{{ wsl_distribution_name }}\home\{{ wsl_user_name }}\ansible\facts
        state: directory
      become: true
      become_method: '{{ metatrader_become_method[detected_os_family] }}'
      become_user: '{{ ansible_facts.env.USERNAME }}'
      when: detected_os_family == "Windows"
    - name: Saves role's facts (Unix)
      ansible.builtin.copy:
        content: '{{ metatrader | to_nice_json }}'
        dest: /etc/ansible/facts.d/metatrader.fact
        mode: '0644'
      when:
        - detected_os_family != "Windows"
        - metatrader is defined
    - name: Saves role's facts (Windows)
      ansible.windows.win_copy:
        content: '{{ metatrader | to_nice_json }}'
        # yamllint disable-line rule:line-length
        dest: \\wsl.localhost\{{ wsl_distribution_name }}\home\{{ wsl_user_name }}\ansible\facts\metatrader.fact
      become: true
      become_method: '{{ metatrader_become_method[detected_os_family] }}'
      become_user: '{{ ansible_facts.env.USERNAME }}'
      when:
        - detected_os_family == "Windows"
        - metatrader is defined
