---
# noqa: schema[meta]
# Documentation: https://docs.ansible.com/ansible/latest/dev_guide/collections_galaxy_meta.html
dependencies:
  - role: ea31337.wine
    vars:
      wine_install_winetricks: true
      wine_version: "{{ '9' if ansible_facts.os_family == 'Alpine' else '10.0' }}"
    scm: git
    src: https://github.com/EA31337/ansible-role-wine.git
    version: v1.0.4  # This should match version in requirements.yml
    when: ansible_facts.os_family != "Windows"
  - name: ea31337.xvfb
    role: ea31337.xvfb
    scm: git
    src: https://github.com/EA31337/ansible-role-xvfb.git
    version: v1.0.4  # This should match version in requirements.yml
    when: ansible_facts.os_family != "Windows"
galaxy_info:
  author: kenorb
  company: EA31337 Ltd
  description: |
    Role to install MetaTrader platform.
  galaxy_tags:
    - desktop
    - development
    - docker
    - emulator
    - forex
    - gui
    - linux
    - system
    - trading
    - ubuntu
    - windows
    - wine
  license: GPL-3.0-or-later
  min_ansible_version: '2.7'
  namespace: ea31337
  platforms:
    - name: Alpine
      versions:
        - all
    - name: Debian
      versions:
        - all
        - bullseye
        - bookworm
    - name: Ubuntu
      versions:
        - all
        - focal
        - jammy
        - noble
  role_name: metatrader
