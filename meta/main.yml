---
# noqa: schema[meta]
# Documentation: https://docs.ansible.com/ansible/latest/dev_guide/collections_galaxy_meta.html
dependencies:
  - role: ea31337.wine
    vars:
      wine_install_winetricks: true
      wine_version: '10.0'
      # Explicitly pass facts to support inject_facts_as_vars = False
      ansible_os_family: "{{ ansible_facts.get('os_family') | default('Debian', true) }}"
      ansible_distribution: "{{ ansible_facts.get('distribution') | default('Ubuntu', true) }}"
      ansible_user_id: "{{ ansible_facts.get('user_id', 'root') }}"
      ansible_env: >-
        {{ ansible_facts.get('env', {})
        | combine({'HOME': ansible_facts.get('user_dir', '/root')}, recursive=True) }}
    version: v1.0.4  # This should match version in requirements.yml
    when: (ansible_facts.get('os_family') | default('', true)) not in ["Windows", ""]
  - role: ea31337.xvfb
    vars:
      # Explicitly pass facts to support inject_facts_as_vars = False
      ansible_os_family: "{{ ansible_facts.get('os_family') | default('Debian', true) }}"
      ansible_distribution: "{{ ansible_facts.get('distribution') | default('Ubuntu', true) }}"
      ansible_user_id: "{{ ansible_facts.get('user_id', 'root') }}"
    version: v1.0.4  # This should match version in requirements.yml
    when: (ansible_facts.get('os_family') | default('', true)) not in ["Windows", ""]
galaxy_info:
  author: kenorb
  company: EA31337 Ltd
  description: |
    Role to install MetaTrader platform.
  galaxy_tags:
    - desktop
    - development
    - docker
    - emulator
    - forex
    - gui
    - linux
    - system
    - trading
    - ubuntu
    - windows
    - wine
  license: GPL-3.0-or-later
  min_ansible_version: '2.7'
  namespace: ea31337
  platforms:
    - name: Debian
      versions:
        - all
        - bullseye
        - bookworm
    - name: Ubuntu
      versions:
        - all
        - focal
        - jammy
        - noble
  role_name: metatrader
