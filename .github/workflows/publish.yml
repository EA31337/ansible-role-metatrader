---
# Note: Keep keys and envs in alphabetical order.
name: Publish
# yamllint disable-line rule:truthy
on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      metatrader_docker_push:
        description: Push image to registry
        required: true
        type: boolean
        default: false
      metatrader_docker_image:
        description: Docker image name
        required: true
        type: string
        default: ea31337/metatrader
      metatrader_docker_tag:
        description: Docker image tag
        required: true
        type: string
        default: latest
permissions:
  contents: read
concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}
jobs:
  publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          cache: pip
          cache-dependency-path: '**/.devcontainer/requirements.txt'
          python-version: '3.11'
      - name: Install Python's requirements
        run: pip install -r .devcontainer/requirements.txt
      - name: Install Ansible Galaxy requirements
        run: |
          ansible-galaxy collection install -r requirements.yml -p collections
          ansible-galaxy install -r requirements.yml
          jinja2 requirements-local.yml.j2 -D "pwd=$PWD" -o requirements-local.yml
          ansible-galaxy install -r requirements-local.yml && rm requirements-local.yml
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        if: ${{ github.event_name == 'release' || github.event.inputs.metatrader_docker_push == 'true' }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Publish Docker Image
        run: |
          TAG="${{ github.event.inputs.metatrader_docker_tag || github.event.release.tag_name || 'latest' }}"
          # Normalize tag
          # shellcheck disable=SC2001
          TAG=$(echo "$TAG" | sed 's/[^a-zA-Z0-9_.-]/-/g')
          IMAGE="${{ github.event.inputs.metatrader_docker_image || 'ea31337/metatrader' }}"
          PUSH="${{ github.event.inputs.metatrader_docker_push }}"
          if [ -z "$PUSH" ]; then
            if [ "${{ github.event_name }}" == "release" ]; then
              PUSH="true"
            else
              PUSH="false"
            fi
          fi
          ansible-playbook build-docker.yml \
            -e "metatrader_docker_push=$PUSH" \
            -e "metatrader_docker_tag=$TAG" \
            -e "metatrader_docker_image=$IMAGE"
        env:
          ANSIBLE_FORCE_COLOR: '1'
