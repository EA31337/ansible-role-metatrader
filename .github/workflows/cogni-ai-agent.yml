---
# See: <https://opencode.ai/docs>
name: Cogni AI Agent
# yamllint disable-line rule:truthy
on:
  issues:
    types:
      - opened
      - edited
      - reopened
  issue_comment:
    types:
      - created
      - edited
  discussion:
    types:
      - created
      - edited
      - answered
  discussion_comment:
    types:
      - created
      - edited
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
  pull_request_review_comment:
    types:
      - created
      - edited
  workflow_call:
    inputs:
      agent:
        default: cogni-ai-architect
        description: Agent to use.
        required: false
        type: string
      model:
        default: opencode/gemini-3-flash
        description: Model to use for OpenCode
        required: false
        type: string
      prompt:
        default: ""
        description: Prompt for the agent
        required: false
        type: string
  workflow_dispatch:
    inputs:
      agent:
        default: cogni-ai-architect
        description: Agent to use.
        options:
          - cogni-ai-architect
          - cogni-ai-brain-ops
          - cogni-ai-code-reviewer
          - cogni-ai-devops
          - cogni-ai-manager
          - cogni-ai-plan-reviewer
          - default
        required: false
        type: choice
      model:
        default: opencode/gemini-3-flash
        description: Model to use for OpenCode
        options:
          - opencode/big-pickle
          - opencode/claude-3-5-haiku
          - opencode/claude-haiku-4-5
          - opencode/claude-opus-4-5
          - opencode/claude-opus-4-6
          - opencode/claude-sonnet-4
          - opencode/claude-sonnet-4-5
          - opencode/claude-sonnet-4-6
          - opencode/gemini-3.1-pro
          - opencode/gemini-3-flash
          - opencode/glm-5
          - opencode/glm-5.1
          - opencode/gpt-5
          - opencode/gpt-5-codex
          - opencode/gpt-5-nano
          - opencode/gpt-5.3-codex
          - opencode/gpt-5.3-codex-spark
          - opencode/gpt-5.4
          - opencode/gpt-5.4-mini
          - opencode/gpt-5.4-nano
          - opencode/minimax-m2.5
          - opencode/minimax-m2.5-free
          - opencode/nemotron-3-super-free
          - opencode/qwen3-coder
          - opencode/qwen3.6-plus-free
        required: true
        type: choice
      prompt:
        description: Prompt for the agent
        required: true
        type: string
jobs:
  cogni-ai-agent:
    name: Run Cogni AI agent
    # Note: These are pre-run conditions, actual trigger conditions are defined within the action it-self.
    if: |
      (
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'workflow_call' ||
        github.event.sender.type != 'Bot'
      ) &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'workflow_call' ||
        github.event_name == 'pull_request' ||
        contains(
          github.event.comment.body ||
          github.event.issue.body ||
          github.event.pull_request.body ||
          github.event.discussion.body ||
          '',
          '/'
        ) ||
        contains(
          github.event.comment.body ||
          github.event.issue.body ||
          github.event.pull_request.body ||
          github.event.discussion.body ||
          '',
          '@'
        )
      )
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      discussions: write
      id-token: write
      issues: write
      models: read
      packages: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false  # Prevents Duplicate header: "Authorization" error.
      - uses: actions/setup-python@v6.1.0
        with:
          python-version: '3.12'
      - name: Restore Python user site
        id: python-user-site
        uses: actions/cache@v5
        with:
          path: ~/.local
          key: ${{ runner.os }}-pip-${{ hashFiles('.devcontainer/requirements.txt') }}
      - name: Install Python dependencies
        if: steps.python-user-site.outputs.cache-hit != 'true'
        run: python -m pip install --user -r .devcontainer/requirements.txt
      - name: Ensure local bin on PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      # See: <https://github.com/Cogni-AI-OU/cogni-ai-agent-action>
      - name: Run Cogni AI Agent
        uses: Cogni-AI-OU/cogni-ai-agent-action@main
        with:
          agent: ${{ inputs.agent }}
          model: ${{ inputs.model }}
          opencode-api-key: ${{ secrets.OPENCODE_API_KEY }}  # <https://opencode.ai/auth>
          permissions: |-
            bash:
              '*': deny
              ansible*: allow
              ansible-galaxy*: allow
              ansible-playbook*: allow
              awk*: allow
              continue*: allow
              cp*: allow
              docker*: allow
              ex*: allow
              gh*: allow
              gh pr review*: allow
              git*: allow
              head*: allow
              hexdump*: allow
              jq*: allow
              links*: allow
              ls*: allow
              mawk*: allow
              molecule*: allow
              pipx*: allow
              pre-commit*: allow
              printf*: allow
              sed*: allow
              set*: allow
              time*: allow
              timeout*: allow
              touch*: allow
              true*: allow
              vim*: allow
          prompt: >-
            ${{ github.event.comment.body
            || github.event.issue.body
            || github.event.pull_request.body
            || github.event.discussion.body
            || inputs.prompt }}
    timeout-minutes: 60
  summary:
    name: Generate Summary (post-run)
    needs: cogni-ai-agent
    if: always() && needs.cogni-ai-agent.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
      models: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Generate Summary
        uses: Cogni-AI-OU/cogni-ai-agent-action/ai-inference/summary@main
        with:
          agent_job_id: cogni-ai-agent
          github_token: ${{ secrets.GITHUB_TOKEN }}
