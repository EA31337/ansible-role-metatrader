---
name: Platform (Linux)
env:
  ARTIFACT_NAME: ${{ inputs.artifact || 'platform' }}
  VERSION: ${{ inputs.version || 5 }}
# yamllint disable-line rule:truthy
on:
  pull_request:
    paths-ignore:
      - .github/workflows/**
      - '**.cfg'
      - '**.md'
      - .*
      - LICENSE
      - Pipfile*
  push:
    branches:
      - master
      - dev
      - dev-*
    paths-ignore:
      - .github/workflows/**
      - '**.cfg'
      - '**.md'
      - .*
      - LICENSE
      - Pipfile*
  workflow_call:
    inputs:
      artifact:
        default: platform
        description: Artifact name
        required: false
        type: string
      cleanup:
        default: false
        description: Whether to run clean-up job
        required: false
        type: boolean
      ref:
        default: dev
        description: The branch, tag or SHA to checkout.
        required: false
        type: string
      version:
        default: 5
        description: Version to install
        type: number
jobs:
  platform-linux:
    name: Platform
    outputs:
      workdir: ${{ github.workspace }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false  # Prevents Duplicate header: "Authorization" error.
          ref: ${{ github.event_name == 'workflow_call' && inputs.ref || github.ref }}
      - name: Set up Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v5.0.1
        with:
          key: ${{ runner.os }}-pip-${{ hashFiles('Pipfile*', '.devcontainer/requirements.txt') }}
          path: ~/.cache/pip
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install Python's requirements
        run: pip install -r .devcontainer/requirements.txt
      - name: Install Ansible Galaxy local requirements
        run: |
          ansible-galaxy install -r requirements.yml
          jinja2 requirements-local.yml.j2 -D "pwd=$PWD" -o requirements-local.yml
          ansible-galaxy install -r requirements-local.yml && rm requirements-local.yml
      - name: Runs playbook
        uses: dawidd6/action-ansible-playbook@v2
        with:
          configuration: |
            [defaults]
            nocows = false
            stdout_callback = default
            callback_result_format = yaml
          directory: .
          options: |
            --connection local
            --inventory localhost,
            --verbose
            --extra-vars "metatrader_version=${{ env.VERSION }}"
          playbook: molecule/default/converge.yml
          requirements: requirements.yml
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            ~/.wine/drive_c/Program Files*/**/*MT*
            ~/.wine/drive_c/Program Files*/**/*Meta*
    timeout-minutes: 30
  cleanup:
    name: Clean-up
    needs:
      - platform-linux
    runs-on: ubuntu-latest
    steps:
      - uses: geekyeggo/delete-artifact@v4
        if: >-
          (github.event_name != 'workflow_call' || inputs.cleanup)
          && github.repository == 'EA31337/ansible-role-metatrader'
        with:
          name: ${{ env.ARTIFACT_NAME }}
