---
# Note: Keep keys and envs in alphabetical order.
name: Test
# yamllint disable-line rule:truthy
on:
  pull_request:
    paths-ignore:
      - '**/*.cfg'
      - '**/*.md'
      - .*
      - Pipfile*
  push:
    paths-ignore:
      - '**/*.cfg'
      - '**/*.md'
      - .*
      - Pipfile*
permissions:
  contents: read
concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}
jobs:
  test:
    name: Test (${{ matrix.container }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        container:
          - metatrader-on-debian-latest
          - metatrader-on-ubuntu-jammy
          - metatrader-on-ubuntu-latest
          - metatrader-on-ubuntu-noble
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      TARGET_CONTAINER: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: ${{ github.repository }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-pip-${{ hashFiles('**/Pipfile*', '**/.devcontainer/requirements.txt') }}
          path: ~/.cache/pip
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Cache Ansible Galaxy
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-galaxy-${{ hashFiles('**/requirements.yml') }}
          path: |
            ~/.ansible/roles
            ~/.ansible/collections
          restore-keys: |
            ${{ runner.os }}-galaxy-
      - name: Install Python's requirements
        run: pip install -r .devcontainer/requirements.txt
        working-directory: ${{ github.repository }}
      - name: Install Ansible Galaxy requirements
        run: |
          ansible-galaxy collection install -r requirements.yml -p collections
          ansible-galaxy install -r requirements.yml
        working-directory: ${{ github.repository }}
      - name: Install Ansible Galaxy local requirements
        run: |
          jinja2 requirements-local.yml.j2 -D "pwd=$PWD" -o requirements-local.yml
          ansible-galaxy install -r requirements-local.yml && rm requirements-local.yml
        working-directory: ${{ github.repository }}
      - name: Check Ansible syntax
        run: >-
          ansible-playbook --syntax-check
          -i tests/inventory/docker-containers.yml
          tests/playbooks/docker-containers.yml
          --limit "${TARGET_CONTAINER},localhost"
          --verbose
        working-directory: ${{ github.repository }}
      - name: Run Ansible lint
        run: ansible-lint tests/playbooks/docker-containers.yml
        working-directory: ${{ github.repository }}
      - name: Run Ansible playbook
        run: >-
          ansible-playbook -i tests/inventory/docker-containers.yml
          --limit "${TARGET_CONTAINER},localhost"
          tests/playbooks/docker-containers.yml
        working-directory: ${{ github.repository }}

      # Debug with tmate on failure when debug logging is enabled.
      - if: ${{ failure() && runner.debug == '1' }}
        uses: mxschmitt/action-tmate@v3
    timeout-minutes: 30
