---
- name: Configure Docker container
  # Note: Since facts are not gathered, we're checking for ansible_user_id, connection_user or UID instead.
  become: >-
    {{
      (connection_user | default('root')) != 'root'
      or (ansible_user_id | default('root')) != 'root'
      or (ansible_user_uid | default(0) | int) != 0
      or (((ansible_env | default({}))['UID'] | default(0) | int) != 0)
      or (
        ((ansible_env | default({}))['USER']
        | default(((ansible_env | default({}))['LOGNAME'] | default('root'))) )
        != 'root'
      )
    }}
  # Use su as become_method as sudo is not available in all containers.
  become_method: ansible.builtin.su
  gather_facts: false
  hosts: docker_containers
  vars:
    wine_image: ghcr.io/ea31337/ansible-role-wine:latest
  pre_tasks:
    - name: Manage Docker container lifecycle
      delegate_to: localhost
      vars:
        ansible_python_interpreter: '{{ ansible_playbook_python }}'
      block:
        - name: Ensure container is started
          community.docker.docker_container:
            name: '{{ inventory_hostname }}'
            image: '{{ wine_image }}'
            state: started
            command: sleep infinity
            recreate: true
            pull: true
        - name: Wait for container to be ready
          community.docker.docker_container_info:
            name: '{{ inventory_hostname }}'
          register: container_info
          until:
            - container_info is defined
            - container_info.container.State.Running | default(false) | bool
          changed_when: false
          delay: 2
          retries: 10
        - name: Bootstrap Python and Sudo
          ansible.builtin.raw: |
            if command -v python3 >/dev/null 2>&1 && command -v sudo >/dev/null 2>&1; then
              exit 0
            fi
            if command -v apk >/dev/null 2>&1; then
              apk add -q --no-cache python3 sudo
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get update -qq && \
              DEBIAN_FRONTEND=noninteractive apt-get install -y -qq python3-minimal sudo
            fi
          changed_when: false
- name: Install ea31337.metatrader role on the container
  hosts: docker_containers
  gather_facts: true
  tasks:
    - name: Installs ea31337.metatrader role
      ansible.builtin.import_role:
        name: ea31337.metatrader
  post_tasks:
    - name: Stop Docker containers
      community.docker.docker_container:
        name: '{{ inventory_hostname }}'
        state: absent
      delegate_to: localhost
      failed_when: false
      vars:
        ansible_python_interpreter: '{{ ansible_playbook_python }}'
