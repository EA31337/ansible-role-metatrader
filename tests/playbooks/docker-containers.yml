---
- name: Configure Docker container
  # Note: Since facts are not gathered, we're checking for ansible_user_id, connection_user or UID instead.
  become: >-
    {{ (connection_user is defined and connection_user != 'root')
    or (ansible_user_id is defined and ansible_user_id != 'root')
    or (lookup('env', 'UID') | int != 0)
    }}
  # Use su as become_method as sudo is not available in all containers.
  become_method: ansible.builtin.su
  # Note: NixOS coverage is excluded from this playbook because it is handled by Molecule scenarios.
  # See: molecule/default/molecule.yml
  gather_facts: false
  hosts: docker_containers,!metatrader-on-nixos-latest
  pre_tasks:
    - name: Ensure container is started
      community.docker.docker_container:
        name: '{{ inventory_hostname }}'
        image: '{{ container_image }}'
        state: started
        command: sleep infinity
      delegate_to: localhost
      vars:
        # Use system Python with requests installed for controller-side Docker modules.
        ansible_python_interpreter: '{{ controller_python }}'
    - name: Wait for container to be ready
      community.docker.docker_container_info:
        name: '{{ inventory_hostname }}'
      register: container_info
      until:
        - container_info is defined
        - container_info.container.State.Running | default(false) | bool
      changed_when: false
      delay: 2
      delegate_to: localhost
      retries: 10
      vars:
        # Use system Python with requests installed for controller-side Docker modules.
        ansible_python_interpreter: '{{ controller_python }}'
    - name: Install Python 3 for Ansible
      ansible.builtin.include_tasks: tasks/install-python.yml
    - name: Gather facts
      ansible.builtin.setup:
    - name: Install Python packages for Ubuntu/Debian
      ansible.builtin.apt:
        name:
          - python3
          - python3-pip
          - python3-setuptools
        state: present
        update_cache: true
      no_log: '{{ ansible_verbosity | default(0) < 1 }}'
      when: container_image is search("ubuntu") or container_image is search("debian")
  tags: always
  vars:
    controller_python: '{{ ansible_playbook_python }}'
    container_image_map:
      metatrader-on-alpine-latest: alpine:3.20
      metatrader-on-debian-latest: debian:latest
      metatrader-on-nixos-latest: nixos/nix
      metatrader-on-ubuntu-jammy: ghcr.io/ea31337/ansible-role-wine:ubuntu-jammy
      metatrader-on-ubuntu-noble: ghcr.io/ea31337/ansible-role-wine:ubuntu-noble
    container_image: >-
      {{ container_image_map[inventory_hostname]
      | default('ghcr.io/ea31337/ansible-role-wine:ubuntu-noble') }}
- name: Install ea31337.metatrader role on all containers
  # Note: NixOS coverage is handled by Molecule scenarios.
  hosts: docker_containers,!metatrader-on-nixos-latest
  gather_facts: true
  tags: always
  vars:
    controller_python: '{{ ansible_playbook_python }}'
    wine_release_codename: >-
      {{ 'noble' if ansible_facts.distribution_release == 'resolute'
      else ansible_facts.distribution_release }}
  tasks:
    - name: Installs metatrader role
      ansible.builtin.import_role:
        name: ea31337.metatrader
  post_tasks:
    - name: Stop Docker containers
      community.docker.docker_container:
        name: '{{ inventory_hostname }}'
        state: stopped
      delegate_to: localhost
      failed_when: false
