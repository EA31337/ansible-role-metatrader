---
# Molecule configuration file.
# Dependency management (download roles/collections)
# Note: Keep YAML keys sorted alphabetically.
dependency:
  name: galaxy
  options:
    ignore-certs: false
    ignore-errors: false
    requirements-file: requirements.yml
    role-file: requirements.yml
driver:
  name: docker
lint: |
  set -e
  yamllint .
  ansible-lint
  molecule syntax
platforms:
  - name: alpine-latest
    image: alpine:latest
    dockerfile: ../resources/playbooks/Dockerfile.j2
  - name: ubuntu-latest
    image: ubuntu:latest
  - name: ubuntu-noble
    image: ubuntu:noble
provisioner:
  config_options:
    defaults:
      # Temporary workaround for molecule-docker 2.1.0 compatibility with Ansible >= 2.19
      # It is deprecated and planned for removal in ansible-core 2.23.
      # TODO: Remove once https://github.com/ansible-community/molecule-plugins/issues/295 is resolved.
      allow_broken_conditionals: true
      callbacks_enabled: ansible.posix.profile_tasks
      # Ensure collections installed to ./collections are found by ansible-playbook.
      collections_path: ${MOLECULE_PROJECT_DIRECTORY}/collections:~/.ansible/collections:/usr/share/ansible/collections
      deprecation_warnings: false
      host_key_checking: false
      # Use the built-in default callback with result_format instead of community.general.yaml
      remote_tmp: /tmp/.ansible-tmp-$${USER}
      result_format: yaml
      stdout_callback: ansible.builtin.default
      verbosity: 1
    ssh_connection:
      pipelining: true
  env:
    ANSIBLE_FORCE_COLOR: '1'
    ANSIBLE_LOAD_CALLBACK_PLUGINS: '1'
  inventory:
    group_vars:
      all:
        wine_install_winetricks: true
        wine_release: stable
        wine_winetricks_winver: win10
    host_vars:
      ubuntu-latest:
        wine_release_codename: '{{ ansible_facts.distribution_release | lower }}'
      ubuntu-noble:
        wine_release_codename: noble
  name: ansible
  options:
    diff: true
    force-handlers: true
  playbooks:
    converge: converge.yml
    create: create.yml
    destroy: destroy.yml
    prepare: prepare.yml
    verify: verify.yml
scenario:
  name: default
  test_sequence:
    - dependency
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
verifier:
  name: ansible
