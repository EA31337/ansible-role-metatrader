---
- name: Prepare hosts
  hosts: "all:!nixos*"
  gather_facts: false
  tasks:

    - name: Install Python for Ansible
      ansible.builtin.raw: |
        if command -v python3 || command -v python; then
          exit 0
        elif command -v apk; then
          apk add --no-cache python3 py3-pip
        elif command -v apt; then
          apt -y update && apt install -y python3-minimal
        elif command -v dnf; then
          dnf install -y python3
        elif command -v zypper; then
          zypper --non-interactive install python3
        else
          echo "No supported package manager found" >&2
          exit 1
        fi
      changed_when: false

- name: Prepare NixOS hosts
  hosts: "nixos*"
  gather_facts: false
  tasks:

    - name: Install Python for Ansible on NixOS
      ansible.builtin.raw: |
        if command -v python3 || command -v python; then
          exit 0
        fi
        # Ensure Nix config directory exists
        mkdir -p /etc/nix

        # Append sandbox setting instead of overwriting existing configuration
        if ! grep -q '^[[:space:]]*sandbox[[:space:]]*=' /etc/nix/nix.conf 2>/dev/null; then
          printf "sandbox = false\n" >> /etc/nix/nix.conf
        fi

        export NIX_CONFIG="sandbox = false"
        nix-env --option sandbox false \
          -iA nixpkgs.python3 nixpkgs.python3Packages.pip
      changed_when: false
