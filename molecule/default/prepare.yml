---
- name: Prepare hosts
  hosts: all
  gather_facts: false
  tasks:
    - name: Bootstrap Python and Sudo
      ansible.builtin.raw: |
        if (command -v python3 >/dev/null 2>&1 || command -v python >/dev/null 2>&1) && \
           (command -v sudo >/dev/null 2>&1); then
          exit 0
        fi
        if command -v apt-get >/dev/null 2>&1; then
          if grep -qi '^ID=ubuntu' /etc/os-release 2>/dev/null; then
            mirror="http://azure.archive.ubuntu.com/ubuntu"
            if [ -f /etc/apt/sources.list ]; then
              sed -i \
                -e "s|http://archive.ubuntu.com/ubuntu|$mirror|g" \
                -e "s|http://security.ubuntu.com/ubuntu|$mirror|g" \
                /etc/apt/sources.list
            fi
            if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
              sed -i \
                -e "s|http://archive.ubuntu.com/ubuntu|$mirror|g" \
                -e "s|http://security.ubuntu.com/ubuntu|$mirror|g" \
                /etc/apt/sources.list.d/ubuntu.sources
            fi
          fi
          apt-get update -qq && \
            DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
              python3 python3-apt python3-debian \
              sudo ca-certificates lsb-release
        elif command -v dnf >/dev/null 2>&1; then
          dnf install -y -q python3 sudo ca-certificates
        elif command -v zypper >/dev/null 2>&1; then
          zypper -q --non-interactive install python3 sudo ca-certificates
        else
          echo "Unsupported system: no supported package manager found for bootstrapping Python and sudo" >&2
          exit 1
        fi
      changed_when: false
    - name: Trust proxy CA certificates (if mounted)
      ansible.builtin.raw: |
        if ! ls /usr/local/share/ca-certificates/*.crt >/dev/null 2>&1; then
          exit 0
        fi
        if [ -x "$(command -v update-ca-certificates)" ]; then
          if [ -d /usr/share/ca-certificates ]; then
            cp /usr/local/share/ca-certificates/*.crt /usr/share/ca-certificates/
            if [ -f /etc/ca-certificates.conf ]; then
              for f in /usr/local/share/ca-certificates/*.crt; do
                b=$(basename "$f")
                grep -q "^$b" /etc/ca-certificates.conf 2>/dev/null || echo "$b" >> /etc/ca-certificates.conf
              done
            fi
          fi
          update-ca-certificates
          [ -d /etc/ssl/certs ] && chmod 755 /etc/ssl/certs || true
        fi
      changed_when: false
