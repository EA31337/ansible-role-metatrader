---
# Molecule configuration file.
# Dependency management (download roles/collections)
# Note: Keep YAML keys sorted alphabetically.
dependency:
  name: galaxy
  options:
    ignore-certs: false
    ignore-errors: false
    role-file: requirements.yml
    requirements-file: requirements.yml
driver:
  name: docker
lint: |
  set -e
  yamllint .
  molecule syntax
  ansible-lint
platforms:
  - name: windows
    image: mcr.microsoft.com/windows/servercore:ltsc2022
provisioner:
  config_options:
    defaults:
      host_key_checking: false
      # Use the built-in default callback with result_format instead of community.general.yaml
      result_format: yaml
      stdout_callback: ansible.builtin.default
      verbosity: 1
  env:
    ANSIBLE_FORCE_COLOR: "1"
    ANSIBLE_LOAD_CALLBACK_PLUGINS: "1"
  inventory:
    group_vars:
      all:
        metatrader_version: 5
        wine_install_winetricks: true
  options:
    diff: true
    force-handlers: true
    v: true
  playbooks:
    converge: ../default/converge.yml
    prepare: ../default/prepare.yml
verifier:
  name: ansible
